server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    # Runtime config, the service worker, and the app shell must never be cached
    # by the browser — they gate the API URL and update delivery.
    location = /config.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }
    location = /sw.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Hashed build assets are content-addressed — cache them hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every unknown path serves the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
