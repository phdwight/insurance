name: Dependency currency

on:
  schedule:
    - cron: "0 22 * * 0" # Mondays 06:00 PHT
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check Python dependencies (uv lock --upgrade)
        id: python
        run: |
          # Real upgrade in the runner's working tree (never committed):
          # uv prints "Updated <pkg> vX -> vY" lines when anything moves.
          uv lock --upgrade 2>&1 | tee /tmp/uv-report.txt
          if git diff --quiet uv.lock; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
            grep -iE "^(Updated|Added|Removed)" /tmp/uv-report.txt > /tmp/uv-changes.txt || true
          fi

      - name: Check npm dependencies (npm outdated)
        id: npm
        working-directory: pwa
        run: |
          npm outdated --json > /tmp/npm-outdated.json || true
          if [ "$(cat /tmp/npm-outdated.json | wc -c)" -gt 3 ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            node -e '
              const data = require("/tmp/npm-outdated.json");
              const rows = Object.entries(data).map(([name, info]) =>
                `| ${name} | ${info.current ?? "?"} | ${info.latest} |`);
              const table = ["| package | current | latest |", "|---|---|---|", ...rows];
              require("fs").writeFileSync("/tmp/npm-changes.txt", table.join("\n"));
            '
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update the currency issue
        if: steps.python.outputs.stale == 'true' || steps.npm.outputs.stale == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const read = (path) => {
              try { return fs.readFileSync(path, "utf8").trim(); } catch { return ""; }
            };
            const pyChanges = read("/tmp/uv-changes.txt");
            const npmChanges = read("/tmp/npm-changes.txt");

            const sections = [];
            if (pyChanges) {
              sections.push(`## Python (uv)\n\n\`\`\`\n${pyChanges}\n\`\`\`\n` +
                "Refresh with: `uv lock --upgrade && uv run pytest`, commit `uv.lock`.");
            }
            if (npmChanges) {
              sections.push(`## npm (pwa/)\n\n${npmChanges}\n\n` +
                "Refresh with: bump `pwa/package.json`, `npm install`, `npm run build`.");
            }
            const body =
              "Automated weekly check found dependencies behind latest stable.\n\n" +
              sections.join("\n\n") +
              `\n\n_Last checked: ${new Date().toISOString().slice(0, 10)}_`;

            const title = "Dependency currency: updates available";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "dependencies",
            });
            const existing = issues.find(issue => issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["dependencies"],
              });
            }

      - name: Close the issue when everything is current
        if: steps.python.outputs.stale == 'false' && steps.npm.outputs.stale == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Dependency currency: updates available";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "dependencies",
            });
            const existing = issues.find(issue => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number,
                body: "Everything is back at latest stable — closing.",
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, state: "closed",
              });
            }
