name: Publish images

# Build and push service images to GHCR when image-affecting code lands on main
# (a merged PR, or a direct push). Replaces running deploy/push-images.sh by hand.
# Also runnable on demand from the Actions tab (workflow_dispatch → rebuilds all).
#
# Only the images whose inputs actually changed are rebuilt (see the `changes`
# job): a pwa-only change rebuilds just pwa; an agent-only change rebuilds just
# agent. Shared Python inputs (shared/, uv.lock, pyproject.toml, Dockerfile.python)
# legitimately fan out to every Python image, since they all embed them.
#
# Multi-arch (amd64 + arm64) on NATIVE runners — no QEMU — so the heavy
# torch/docling ingestion image builds reliably on arm64 (the NAS target). Each
# arch is pushed by digest; a per-image manifest list is then assembled and
# tagged :latest and :sha-<short>. Mirrors what push-images.sh does locally.
#
# First-run note: GITHUB_TOKEN can push these packages only if each existing
# ghcr.io/<owner>/insurance-* package grants THIS repo write access. If the first
# run fails with "denied", open the package on GitHub → Package settings →
# "Manage Actions access" → add the `insurance` repo with the Write role (or
# delete the old package so the workflow recreates it already linked to the repo).

on:
  push:
    branches: [main]
    # First gate: skip the whole workflow when nothing image-affecting changed
    # (docs / diagrams / harness / compose). The `changes` job then narrows to
    # the specific images that changed. See harness/deploy-gotchas.md.
    paths:
      - "api/**"
      - "agent/**"
      - "mcp-server/**"
      - "ingestion/**"
      - "db/**"
      - "shared/**"
      - "pwa/**"
      - "Dockerfile.python"
      - "pyproject.toml"
      - "uv.lock"
      - "log_config.yaml"
      - ".github/workflows/publish-images.yml"
  workflow_dispatch:

concurrency:
  group: publish-images
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # Decide which images to (re)build. Shared Python inputs fan out to every
  # Python image; pwa is independent. workflow_dispatch rebuilds everything.
  changes:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set.outputs.images }} # JSON array of build matrix objects
      names: ${{ steps.set.outputs.names }} # JSON array of image names (merge matrix)
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared: &shared
              - 'Dockerfile.python'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'shared/**'
              - 'log_config.yaml'
              - '.github/workflows/publish-images.yml'
            migrate:
              - *shared
              - 'db/**'
            api:
              - *shared
              - 'api/**'
            agent:
              - *shared
              - 'agent/**'
            mcpserver:
              - *shared
              - 'mcp-server/**'
            ingestion:
              - *shared
              - 'ingestion/**'
            pwa:
              - 'pwa/**'
              - '.github/workflows/publish-images.yml'
      - id: set
        env:
          DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
          MIGRATE: ${{ steps.filter.outputs.migrate }}
          API: ${{ steps.filter.outputs.api }}
          AGENT: ${{ steps.filter.outputs.agent }}
          MCPSERVER: ${{ steps.filter.outputs.mcpserver }}
          INGESTION: ${{ steps.filter.outputs.ingestion }}
          PWA: ${{ steps.filter.outputs.pwa }}
        run: |
          images='[]'; names='[]'
          add() { images=$(jq -c ". += [$1]" <<<"$images"); names=$(jq -c ". += [$2]" <<<"$names"); }
          on() { [ "$DISPATCH" = true ] || [ "$1" = true ]; }
          on "$MIGRATE"   && add '{"name":"migrate","service":"db"}' '"migrate"'
          on "$API"       && add '{"name":"api","service":"api"}' '"api"'
          on "$AGENT"     && add '{"name":"agent","service":"agent"}' '"agent"'
          on "$MCPSERVER" && add '{"name":"mcp-server","service":"mcp-server"}' '"mcp-server"'
          on "$INGESTION" && add '{"name":"ingestion","service":"ingestion","apt":"libgl1 libglib2.0-0"}' '"ingestion"'
          on "$PWA"       && add '{"name":"pwa","dockerfile":"pwa/Dockerfile.prod","context":"pwa"}' '"pwa"'
          echo "images=$images" >>"$GITHUB_OUTPUT"
          echo "names=$names" >>"$GITHUB_OUTPUT"
          echo "Rebuilding: $names"

  build:
    name: build ${{ matrix.image.name }} (${{ matrix.platform.arch }})
    needs: changes
    if: needs.changes.outputs.images != '[]'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.changes.outputs.images) }}
        platform:
          - { arch: amd64, runner: ubuntu-latest }
          - { arch: arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context || '.' }}
          file: ${{ matrix.image.dockerfile || 'Dockerfile.python' }}
          platforms: linux/${{ matrix.platform.arch }}
          build-args: |
            SERVICE=${{ matrix.image.service }}
            APT_PACKAGES=${{ matrix.image.apt }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/insurance-${{ matrix.image.name }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image.name }}-${{ matrix.platform.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: merge & tag ${{ matrix.image }}
    needs: [changes, build]
    if: needs.changes.outputs.names != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.changes.outputs.names) }}
    steps:
      - name: Download this image's per-arch digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/insurance-${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ github.repository_owner }}/insurance-${{ matrix.image }}@sha256:%s ' *)
      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ github.repository_owner }}/insurance-${{ matrix.image }}:latest
